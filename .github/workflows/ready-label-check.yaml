name: Check Ready Label

on:
  pull_request_target:
    branches: [ main , 'release/*' ]
    types:
      - labeled
      - unlabeled
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ready-label-check:
    runs-on: gcp-k8s-vllm-util
    steps:
      - name: Set pending status if ready label is not applied
        if: "!contains(github.event.pull_request.labels.*.name, 'ready')"
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -d '{"state":"pending","description":"Waiting for ready label","context":"Ready Label Check"}'
          echo "::warning::The PR is not labeled as 'ready' - status set to pending"

      - name: Set success status if ready label is applied
        if: contains(github.event.pull_request.labels.*.name, 'ready')
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -d '{"state":"success","description":"PR is labeled as ready","context":"Ready Label Check"}'
          echo "::notice::The PR is labeled as 'ready'"
