version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    install:
      - pip install -e ".[dev]"
    build:
      html:
        - python docs/scripts/zensical_gen_files.py
        - zensical build
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      - cp --recursive site/* $READTHEDOCS_OUTPUT/html/
