steps:
  - label: ":gear: llm-compressor GPU Tests"
    command: |
      RUNNER=$$(buildkite-agent meta-data get "test-runner" --default "H100")
      echo "╔══════════════════════════════════════════╗"
      echo "║          BUILD SUMMARY                   ║"
      echo "╠══════════════════════════════════════════╣"
      echo "║ Triggered by : $${BUILDKITE_BUILD_CREATOR}"
      echo "║ Source        : $${BUILDKITE_SOURCE}"
      echo "║ Branch        : $${BUILDKITE_BRANCH}"
      echo "║ Commit        : $${BUILDKITE_COMMIT:0:8}"
      echo "║ PR            : $${BUILDKITE_PULL_REQUEST:-none}"
      echo "║ GPU Runner    : $${RUNNER}"
      echo "╚══════════════════════════════════════════╝"
      buildkite-agent pipeline upload .buildkite/gpu-tests/gpu-tests-$${RUNNER}.yml
  
  # Test check pipeline on XPU (only when relevant paths changed)
  - label: ":gear: llm-compressor XPU Tests"
    shell: bash
    command: |
      git fetch origin main --depth=50
      CHANGED=$$(git diff --name-only origin/main...HEAD)
      XPU_RELEVANT_PATHS=(
        "src/llmcompressor/modifiers/autoround"
        "tests/llmcompressor/transformers/autoround"
        "tests/llmcompressor/modifiers/autoround"
        ".buildkite/xpu-tests"
      )
      XPU_RELEVANT=false

      for path in "$${XPU_RELEVANT_PATHS[@]}"; do
        if echo "$${CHANGED}" | grep -qE "^$${path}"; then
          XPU_RELEVANT=true
          break
        fi
      done

      echo "Changed files:"
      echo "$$CHANGED"
      if [ "$$XPU_RELEVANT" = true ]; then
        echo "XPU-relevant changes detected"
        buildkite-agent pipeline upload .buildkite/xpu-tests/xpu-tests-B60.yml
      else
        echo "No XPU-relevant changes"
      fi