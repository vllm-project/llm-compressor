# Example recipe for Adaptive Column-Sparse compression
#
# This recipe automatically uses stacked layers for layers with low SNR:
# - Tries single-layer column-sparse first
# - If SNR < 25 dB, automatically switches to stacked layers
# - Maintains similar parameter count
#
# Key parameters:
#   - method: "column_sparse" - Now adaptive (auto-stacks if needed)
#   - rank: Target sparsity (0.5 = 50% compression)
#   - target_snr_db: Target SNR threshold

TensorNetworkModifier:
  # Compression method: "column_sparse" with adaptive stacking
  method: "column_sparse"

  # Target sparsity: 0.5 = keep 50% of columns
  # If auto-stacking triggers, uses ~sqrt(0.5) ≈ 0.85 per layer
  rank: 0.5

  # Target SNR threshold in dB
  # Layers below this after stacking are reported
  target_snr_db: 30.0

  # Compress all attention layers
  targets:
    - "re:.*self_attn.(q|k|v|o)_proj$"
    # Or all Linear layers:
    # - "Linear"

  # Always ignore these
  ignore:
    - "lm_head"
    - "embed_tokens"

  # Offload to CPU if OOM
  offload_device: "cpu"

# Expected behavior:
# - q_proj: Single layer (SNR ~29 dB) ✓
# - k_proj: Single layer (SNR ~28 dB) ✓
# - v_proj: Stacked 2-3 layers (SNR 15→30+ dB) ✓
# - o_proj: Single layer (SNR ~23 dB) or stacked if < 25 dB
