
cadence: "weekly"
entrypoint: model_free_ptq
# TODO Qwen3.5 requires transformers==5.3.0
# https://github.com/vllm-project/llm-compressor/issues/2707#issuecomment-4442697849
# model: Qwen/Qwen3.5-35B-A3B
model: Qwen/Qwen3-30B-A3B
scheme: FP8_DYNAMIC
ignore: 
  - lm_head
  - re:.*visual.*
  - re:.*embed_tokens.*
  - re:.*linear_attn.*
  - re:.*mtp.*
  - re:.*shared_expert.*
  - re:.*mlp.gate$
lmeval:
  metrics:
    #Dense model achieves .8970 flexible, .8420 strict
    exact_match,flexible-extract: 0.905
    exact_match,strict-match: 0.845
num_gpus: 2
pipeline_parallel: true