cadence: "weekly"
model: Qwen/Qwen3-8B
scheme: NVFP4
dataset_id: HuggingFaceH4/ultrachat_200k
dataset_split: train_sft
num_calibration_samples: 256
lmeval:
  task: gsm8k
  num_fewshot: 5
  limit: 250
  recovery_threshold: 0.95
  metrics:
    exact_match,flexible-extract: 0.70
    exact_match,strict-match: 0.70
num_gpus: 2
pipeline_parallel: true
